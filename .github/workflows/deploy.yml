name: 🚀 Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub UI

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build Expo Web
        run: npx expo export --platform web
        env:
          # Firebase config (public keys - an toàn để đặt trong env)
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

      - name: 🔍 Verify font files exist
        run: |
          echo "=== Checking font files ==="
          FONT_COUNT=$(find dist -name "*.ttf" | wc -l)
          echo "Found $FONT_COUNT .ttf font files"
          if [ "$FONT_COUNT" -eq "0" ]; then
            echo "❌ ERROR: No font files found! Icon fonts will be broken on Hosting."
            exit 1
          fi
          echo "✅ Font files OK"

      - name: 🔢 Count total dist files
        run: |
          TOTAL=$(find dist -type f | wc -l)
          echo "Total files in dist: $TOTAL"
          if [ "$TOTAL" -lt "50" ]; then
            echo "⚠️ WARNING: Unusually low file count ($TOTAL). Check firebase.json ignore rules!"
          fi

      - name: 🔥 Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: pmp-exam-simulator-7d8dd
